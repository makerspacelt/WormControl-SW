esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf

logger:
  level: INFO
  logs:
    canbus: INFO
  # We have found that a lower baud rate interferes with canbus, maybe because esp is too busy sending serial data.
  baud_rate: 921600 
 
globals:
  - id: g_relay_states # relay output states - max 16 modules, 16 bits for each module
    type: int[16]
    restore_value: yes

esphome:
  name: worm-gw-tester
  includes:
    - <bitset>
  on_boot:
    - priority: -500
      then:
        - delay: 5s 
        - lambda: |-
            id(s_canbus_set_relays)->execute(0b1001, 0b0000000000000001);
        - delay: 0.5s
        - lambda: |-
            id(s_canbus_set_relays)->execute(0b1001, 0b0000000000000011);
        - delay: 0.5s
        - lambda: |-
            id(s_canbus_set_relays)->execute(0b1001, 0b0000000000000111);
        - delay: 0.5s
        - lambda: |-
            id(s_canbus_set_relays)->execute(0b1001, 0b0000000000001111);
        - delay: 0.5s
        - lambda: |-
            id(s_canbus_set_relays)->execute(0b1001, 0b0000000000011111);
        - delay: 0.5s
        - lambda: |-
            id(s_canbus_set_relays)->execute(0b1001, 0b0000000000111111);
        - delay: 0.5s
        - lambda: |-
            id(s_canbus_set_relays)->execute(0b1001, 0b0000000001111111);
        - delay: 0.5s
        - lambda: |-
            id(s_canbus_set_relays)->execute(0b1001, 0b0000000011111111);
        - delay: 0.5s
        - lambda: |-
            id(s_canbus_set_relays)->execute(0b1001, 0b0000000111111111);
        - delay: 0.5s
        - lambda: |-
            id(s_canbus_set_relays)->execute(0b1001, 0b0000001111111111);
        - delay: 0.5s
        - lambda: |-
            id(s_canbus_set_relays)->execute(0b1001, 0b0000011111111111);
        - delay: 0.5s
        - lambda: |-
            id(s_canbus_set_relays)->execute(0b1001, 0b0000111111111111);
        - delay: 0.5s
        - lambda: |-
            id(s_canbus_set_relays)->execute(0b1001, 0b0001111111111111);
        - delay: 0.5s
        - lambda: |-
            id(s_canbus_set_relays)->execute(0b1001, 0b0011111111111111);
        - delay: 0.5s
        - lambda: |-
            id(s_canbus_set_relays)->execute(0b1001, 0b0111111111111111);
        - delay: 0.5s
        - lambda: |-
            id(s_canbus_set_relays)->execute(0b1001, 0b1111111111111111);
        - delay: 0.5s
        - lambda: |-
            id(s_canbus_set_relays)->execute(0b1001, 0b0000000000000000);
        - delay: 0.5s
        - lambda: |-
            id(s_canbus_set_relays)->execute(0b1001, 0b1111111111111111);
        - delay: 0.5s

ethernet:
  type: w5500
  clk_pin: GPIO04
  mosi_pin: GPIO06
  miso_pin: GPIO05
  cs_pin: GPIO03
  interrupt_pin: GPIO20
  reset_pin: GPIO21
  #clock_speed: 16MHz
  # gnd and 3.3V

script:
  - id: s_canbus_set_relays
    parameters:
      relay_addr: int
      relay_states: int
    then:
      - lambda: |-
          // convert relay_states int to canbus message data
          int relay_can_addr = 0b10000000000 | relay_addr;
          std::vector<uint8_t> data(2);
          data[0] = relay_states & 0xff;
          data[1] = (relay_states >> 8) & 0xff;
          id(espcan).send_data(relay_can_addr, false, data);
          
canbus:
  - platform: esp32_can
    id: espcan
    tx_pin: GPIO1
    rx_pin: GPIO0
    can_id: 0
    bit_rate: 125kbps
    on_frame:
      # Relay module address & relay states message:
      - can_id:      0b00010010000
        can_id_mask: 0b01111110000
        then:
          - lambda: |-
              return; 

              // get the relay's address from can id
              int relay_addr = can_id & 0b00000001111;

              if (x.size() != 2) {
                ESP_LOGW("lambda", "Received an invalid data message from relay module (size %d)", x.size());
              } else {
                int relay_states = id(g_relay_states)[relay_addr];
                if (x[0] != (relay_states & 0xff) || x[1] != ((relay_states >> 8) & 0xff)) {
                  // saved output states for this relay does not match current relay state, let's update them via can
                  id(s_canbus_set_relays)->execute(relay_addr, relay_states);
                }
                ESP_LOGI("can-relay", "got msg from relay %s cur_state=%s rl_state=%s%s", // TODO cleanup dev log
                  std::bitset<4>(relay_addr).to_string().c_str(),
                  std::bitset<16>(relay_states).to_string().c_str(),
                  std::bitset<8>(x[1]).to_string().c_str(),
                  std::bitset<8>(x[0]).to_string().c_str()
                );
              }
      - can_id:      0b10010110000
        can_id_mask: 0b11111110000
        then:
          - lambda: |-
              // Get the relay's address from can id
              int relay_addr = can_id & 0b00000001111;

              uint64_t payload = 0;
              for (int i = 0; i < 6; i++) {
                payload |= (static_cast<uint64_t>(x[i]) << (i * 8));
              }

              uint32_t raw = payload & 0xFFFFFFFF;   // mask lowest 32 bits
              float value = *reinterpret_cast<float*>(&raw);

              uint32_t header = (payload >> 32) & 0xFFF; // mask 12 bits
              int sensor_idx = header & 0b000000001111;
              int type = header & 0b111111110000; 
              
              //ESP_LOGD("Monitoring", "Relay addr: %u, Type: %s, Value: %.2f, Index: %u", relay_addr, std::bitset<12>(type).to_string().c_str(), value, sensor_idx);

