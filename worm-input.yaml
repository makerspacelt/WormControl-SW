esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf

esphome:
  name: wormcontrol-relay
  includes:
    - <bitset>

logger:
  level: INFO
  baud_rate: 921600 
 
i2c:
  sda: GPIO2
  scl: GPIO8
  frequency: 100kHz
  scan: true

sn74hc165:
  - id: "i_hub"
    data_pin: GPIO6
    clock_pin: GPIO7
    load_pin: GPIO10
    sr_count: 4

globals:
  - id: g_can_addr
    type: int
    initial_value: "-1"

  - id: g_input_states
    type: int[4]

script:
  - id: s_read_my_addr
    then:
      - lambda: |-
          int dip1 = id(can_dip1).state;
          int dip2 = id(can_dip2).state;
          int dip3 = id(can_dip3).state;
          int dip4 = id(can_dip4).state;
          int old_can_addr = id(g_can_addr);
          int new_can_addr = (dip1 << 3) | (dip2 << 2) | (dip3 << 1) | dip4;
          if (old_can_addr != new_can_addr) {
            id(g_can_addr) = new_can_addr;
            
            ESP_LOGI("s_read_my_addr", "input address change: %s -> %s",
              old_can_addr < 0 ? "n/a" : std::bitset<4>(old_can_addr).to_string().c_str(),
              std::bitset<4>(new_can_addr).to_string().c_str()
            );
            id(s_send_input_states).execute();
          }

  - id: s_send_input_states
    then:
      - lambda: |-
          if (id(g_can_addr) < 0) {
            ESP_LOGI("s_send_input_states", "g_can_addr not ready yet");
            return;
          }
          std::vector<uint8_t> data(4);
          data[0] = id(g_input_states)[0];
          data[1] = id(g_input_states)[1];
          data[2] = id(g_input_states)[2];
          data[3] = id(g_input_states)[3];
          // dev type is 010 for input module
          uint32_t addr = 0b00100010000 | id(g_can_addr);
          id(espcan).send_data(addr, false, data);

  - id: s_send_sensor_state
    parameters:
      type: int
      index: int
      value: float
    then:
      - lambda: |-
          if (id(g_can_addr) < 0) {
            ESP_LOGI("s_send_sensor_state", "g_can_addr not ready yet");
            return;
          }
          uint32_t raw = *reinterpret_cast<uint32_t*>(&value);                  
          uint32_t header = ((type & 0x0F) << 4) | (index & 0x0F);
          uint64_t payload = (static_cast<uint64_t>(header & 0xFFF) << 32) | raw;      
          std::vector<unsigned char> data(6);
          for (int i = 0; i < 6; i++) {
            data[i] = (payload >> (i * 8)) & 0xFF;
          }
          uint32_t addr = 0b10100100000 | id(g_can_addr);  // 0b1 - lower priority ; 010 - dev type (input); 010 - monitoring
          id(espcan).send_data(addr, false, data);        

binary_sensor:
  # canbus address dip switches
  - platform: gpio
    id: can_dip1
    pin: { number: GPIO5, inverted: true, mode: { input: true, pullup: true } }
    filters: { delayed_on_off: 1s }
  - platform: gpio
    id: can_dip2
    pin: { number: GPIO4, inverted: true, mode: { input: true, pullup: true } }
    filters: { delayed_on_off: 1s }
  - platform: gpio
    id: can_dip3
    pin: { number: GPIO3, inverted: true, mode: { input: true, pullup: true } }
    filters: { delayed_on_off: 1s }
  - platform: gpio
    id: can_dip4
    pin: { number: GPIO1, inverted: true, mode: { input: true, pullup: true } }
    filters: { delayed_on_off: 1s }

  # inputs through sn74hc165 expander (32 inputs)
  # sn74hc165 continuously polls hardware in its loop() - no extra polling needed
  # settle filter provides 10ms debouncing
  # on_state updates the specific bit in g_input_states and sends CAN message
  - platform: gpio
    id: IN01
    pin: { sn74hc165: i_hub, number: 24, inverted: true }
    filters: [ { settle: 20ms } ]
    on_state:
      - lambda: |-
          ESP_LOGI("my", "IN01 change %d -> %d", id(g_input_states)[0], x);
          if (x) id(g_input_states)[0] |= (1 << 0);
          else   id(g_input_states)[0] &= ~(1 << 0);
          id(s_send_input_states).execute();
  - platform: gpio
    id: IN02
    pin: { sn74hc165: i_hub, number: 25, inverted: true }
    filters: [ { settle: 20ms } ]
    on_state:
      - lambda: |-
          if (x) id(g_input_states)[0] |= (1 << 1);
          else   id(g_input_states)[0] &= ~(1 << 1);
          id(s_send_input_states).execute();
