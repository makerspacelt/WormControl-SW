canbus:
  - platform: esp32_can
    id: espcan
    tx_pin: GPIO21
    rx_pin: GPIO20
    can_id: 0
    bit_rate: 125kbps
    on_frame:
      # Input module does not receive control messages, but check if any message is addressed to us
      - can_id: 0b10000000000
        can_id_mask: 0b11111110000
        then:
          - lambda: |-
              if ((can_id & 0b00000001111) == id(g_can_addr)) {
                ESP_LOGD("lambda", "Received unexpected message on can_id %d (size %d)", can_id, x.size());
              }

interval:
  # Periodic send of input states every 10s
  - interval: 10s
    startup_delay: 1s
    then:
      - lambda: |-
          id(s_send_input_states).execute();

  # Check for address change every 1s (synced with dip switch debounce)
  - interval: 1s
    startup_delay: 1s
    then:
      - lambda: |-
          id(s_read_my_addr).execute();

sensor:
  - platform: tmp102 # UI panel temp. sensor
    id: temp_1
    address: 0x48
    update_interval: 4000ms
    force_update: True
    on_value:
      then:
        - script.execute:
            id: s_send_sensor_state
            type: 1 # 0b001 Temperature
            index: 1
            value: !lambda "return id(temp_1).state;"  
  - platform: tmp102 # Input PCB temp. sensor
    id: temp_2
    address: 0x49
    update_interval: 4100ms
    force_update: True
    on_value:
      then:
        - script.execute:
            id: s_send_sensor_state
            type: 1 # 0b001 Temperature
            index: 2
            value: !lambda "return id(temp_2).state;"  
  - platform: tmp102 # Middle PCB temp. sensor
    id: temp_3
    address: 0x4A
    update_interval: 4200ms
    force_update: True
    on_value:
      - script.execute:
          id: s_send_sensor_state
          type: 1 # 0b001 Temperature
          index: 3
          value: !lambda "return id(temp_3).state;"  
  - platform: adc
    pin: GPIO00
    id: adc_voltage
    update_interval: 4300ms
    force_update: True
    filters:
      - calibrate_linear:
        - 0.750 -> 24.686
        - 0.000 -> 0
    on_value:
      then:
        - script.execute:
            id: s_send_sensor_state
            type: 3 # 0b011 Voltage
            index: 0
            value: !lambda "return id(adc_voltage).state;"
