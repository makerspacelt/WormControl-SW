substitutions:
  device_name: "worm-control"
  friendly_name: "Worm Control"
  project_name: "makerspacelt.worm-control"
  version: 0.5.0

esphome:
  name: "$device_name"
  friendly_name: "$friendly_name"
  name_add_mac_suffix: true
  project:
    name: "$project_name"
    version: "$version"

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf

preferences:
  # Aiming for 20 years flash lifetime in the most conservative calculation:
  # - 4K bytes per sector, 126 NVS entries per sector (https://docs.espressif.com/projects/esp-faq/en/latest/software-framework/storage/nvs.html)
  # - 112 NVS sectors (448K "eeprom" partition since ESPHome 2026.4.0 with ESP-IDF)
  # - One switch state in flash is 1 NVS entry at 32 bytes
  # - With 225 switch states (all 15 worm_relay modules saving state to flash) we write to max 2 sectors/2 min or 1
  #   sector/1 min (depending on active relays within the period).
  # - So with 112 NVS sectors and 1 sector erase per minute (due to distributed writes), we get (24*60)/112=12.86 erase cycles per 24 hours.
  # - With the normal flash rated for 100k erase cycles per sector, we get 100000/12.86=7776 days=21 years flash lifetime.
  #
  # Possible optimization: instead of using ESPHome switch's restore_mode, we could use lambdas or extend the worm_relay
  # custom component to actually use 1 bit per switch instead of 32 bytes. Then we would not even need to think about
  # flash lifetime.
  flash_write_interval: 2min

external_components:
  - source:
      type: local
      path: mycomponents
    components:
      - worm_input
      - worm_relay

logger:
  level: INFO
  logs:
    canbus: INFO
  # We have found that a lower baud rate interferes with canbus, maybe because esp is too busy sending serial data.
  baud_rate: 921600

ota:
  platform: esphome

ethernet:
  type: w5500
  clk_pin: GPIO04
  mosi_pin: GPIO06
  miso_pin: GPIO05
  cs_pin: GPIO03
  interrupt_pin: GPIO20

# CANbus configuration
canbus:
  - platform: esp32_can
    id: espcan
    tx_pin: GPIO1
    rx_pin: GPIO0
    can_id: 0
    bit_rate: 125kbps

# Single worm_relay component manages all relay modules
# Each module has USR LED + 15 relays (gpio pin numbers 0-15)
worm_relay:
  id: wrl
  canbus: espcan

# Single worm_input component manages all input modules
# Each module has 32 inputs (gpio pin numbers 1-32)
worm_input:
  id: win
  canbus: espcan

debug:
  update_interval: 30s

sensor:
  - platform: debug
    free:
      name: Heap Free
    loop_time:
      name: Loop Time
  - platform: uptime
    name: Uptime
    update_interval: 30s

text_sensor:
  - platform: debug
    reset_reason:
      name: Reset Reason
